<html>
  <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="static/bootstrap.min.css">
    <script>
      const logout = async (e) => {
      //Include the code for logout here.
        let logout_url = window.location.origin + "/djangoapp/logout";
        const response = await fetch(logout_url, {
          method: "GET",
        });

        const json = await response.json();
        if (json) {
          // Clear session storage and reload page
          let username = sessionStorage.getItem("username");
          sessionStorage.removeItem("username");
          window.location.href = window.location.origin;
          window.location.reload();
           // Notify user of logout
          alert("Logging out "+username+"...") 
        }
        else {
          alert("The user could not be logged out.")
        }
      };

      let checkSession = () => {
        let curr_user = sessionStorage.getItem("username");

        if (curr_user && curr_user !== "") {
          document.getElementById("loginlogout").innerHTML = 
          '<span class="btn homepage_links" style="color: #F5F5F5; margin-right: 30px; border: none; border-radius: 200px; background-color: #272E20; padding: 10px 40px;">' + curr_user +'</span>' +
          '<a class="btn homepage_links" onclick="logout()" href="/" style="background-color: #8E0111; color: #F5F5F5; padding: 10px;">Logout</a>'
        } else {
          document.getElementById("loginlogout").innerHTML = 
          '<a class="btn homepage_links" href="/login" style="background-color: #3E5A20; color: #F5F5F5; padding: 10px;">Login</a>'+
          '<a class="btn homepage_links"  href="/register" style="background-color: #272E20; color: #F5F5F5; margin-left: 10px; padding: 10px;">Register</a>'
        }
      }

    </script>
  </head>

  <body onload="checkSession()" style="background-color: #1F1F1F;">

        </button>

        <div class="collapse navbar-collapse" id="navbarText">

            </li>
            <li class="nav-item"  style="margin-left: 20px;">
              <a class="nav-link" style="font-size: larger; color: #F5F5F5;" href="/about">About Us</a>
            </li>
            <li class="nav-item"  style="margin-left: 20px;">
              <a class="nav-link" style="font-size: larger; color: #F5F5F5;" href="/contact">Contact Us</a>
            </li>
          </ul>
          <span class="navbar-text">
            <div class="loginlink" id="loginlogout"></div>
          </span>
        </div>
      </div>

    <div style="display: flex;flex-direction: column;">

        <img style="border-radius: 10px;" src="static/car_dealership.jpg" class="card-img-top" alt="...">

          <h5 style="color: #F5F5F5;">Welcome to our Dealerships!</h5>
